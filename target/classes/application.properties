# ── Server ────────────────────────────────────────────────────────────────────
server.port=8080

# ── Application ───────────────────────────────────────────────────────────────
# Base URL prepended to every generated short link.
# Override with the public hostname in production, e.g. https://short.ly
app.base-url=http://localhost:8080

# CORS: restrict to specific origins in production
# app.cors.allowed-origins=https://yourdomain.com

# ── Datasource (H2 — change to PostgreSQL/MySQL for production) ───────────────
spring.datasource.url=jdbc:h2:mem:urlshortenerdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 console — disable in production
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ── JPA / Hibernate ───────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.open-in-view=false

# ── Jackson ───────────────────────────────────────────────────────────────────
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=UTC

# ── Actuator ─────────────────────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized
info.app.name=URL Shortener
info.app.version=1.0.0

# ── Logging ───────────────────────────────────────────────────────────────────
logging.level.com.urlshortener=INFO
logging.level.org.springframework.web=WARN
logging.pattern.console=%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n

# ────────────────────────────────────────────────────────────────────────────
# PostgreSQL production profile example (activate with -Dspring.profiles.active=prod)
